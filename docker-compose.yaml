version: "3.9"


# =============================================================================
# Production-Grade Outbox Pattern + CDC Stack
# Services: PostgreSQL (source) → Debezium → Kafka → PostgreSQL (analytics)
# =============================================================================

# =============================================================================
# Outbox Pattern + CDC Stack
#
# Data flow:
#   FastAPI ──write──► postgres (orders + outbox_events) [one transaction]
#                           │
#                    WAL logical replication
#                           │
#                      Debezium (kafka-connect)
#                      reads outbox_events via pgoutput plugin
#                      applies Outbox Event Router SMT
#                           │
#                        Kafka
#                      topic: outbox.event.orders
#                           │
#              ┌────────────┴──────────────┐
#              │                           │
#        JDBC Sink                   consumer (Python)
#        connector                   explicit Kafka consumer
#              │                           │
#       postgres-analytics          (same postgres-analytics)
#       orders_cdc table            you can point it anywhere
#
# Ports exposed on host:
#   5433  — source postgres
#   5434  — analytics postgres
#   9092  — kafka (external)
#   8080  — kafka-ui (browser)
#   8083  — kafka-connect REST API
#   8001  — FastAPI
# =============================================================================

networks:
  cdc-net:
    driver: bridge

volumes:
  postgres_data:
  postgres_analytics_data:
  kafka_data:
  zookeeper_data:

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — source of truth, WAL logical replication enabled
  # wal_level=logical is REQUIRED for Debezium to read change streams
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # SOURCE POSTGRES
  #
  # WHY wal_level=logical:
  #   Default wal_level is "replica" — enough for standby replication but
  #   it only records enough to reconstruct pages, not decode row changes.
  #   "logical" adds full before/after column values to WAL records so that
  #   the pgoutput plugin (and therefore Debezium) can decode INSERT/UPDATE/DELETE
  #   into structured JSON. Without this Debezium cannot start.
  #
  # WHY max_replication_slots=4:
  #   Each Debezium connector instance holds one replication slot open.
  #   The slot is how Postgres tracks "this consumer has read up to LSN X"
  #   and guarantees it won't delete WAL segments before that point.
  #   We set 4 so you have headroom for multiple connectors or restarts.
  #
  # NOTE: No postgresql.conf volume mount here — we pass all config via
  #   command-line flags so the container stays self-contained.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: outbox_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orderuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orderpass}
      POSTGRES_DB: ${POSTGRES_DB:-ordersdb}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro   # schema init scripts
      # - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: >
      postgres
        -c wal_level=logical
        -c max_wal_senders=4
        -c max_replication_slots=4
        -c wal_keep_size=256
        -c log_replication_commands=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orderuser} -d ${POSTGRES_DB:-ordersdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cdc-net

  # ---------------------------------------------------------------------------
  # Zookeeper — required by Kafka for cluster coordination
  # In production you'd use KRaft mode (Kafka 3.x), but Debezium's bundled
  # Kafka Connect still ships with ZK-compatible defaults
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: outbox_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - cdc-net

  # ---------------------------------------------------------------------------
  # Kafka — durable event bus, receives decoded CDC events from Debezium
  # KAFKA_ADVERTISED_LISTENERS exposes broker to both Docker network and host
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # KAFKA
  #
  # WHY two listeners (PLAINTEXT vs PLAINTEXT_HOST):
  #   Inside Docker network: other containers reach Kafka at kafka:29092
  #   Outside Docker (your host terminal, Python scripts): reach at localhost:9092
  #   Kafka advertises different addresses depending on which listener a client
  #   connects through. Without this split, cross-container comms work but
  #   your host-side kafka-console-consumer would fail.
  #
  # WHY KAFKA_AUTO_CREATE_TOPICS_ENABLE=true:
  #   Debezium's Outbox Event Router creates topics like outbox.event.orders
  #   automatically when it first routes a message there. Saves manual setup.
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: outbox_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"     # external (host access, e.g. from your API or consumers)
      - "29092:29092"   # internal (Docker network)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Retain messages for 7 days — gives consumers replay window
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - cdc-net

  # ---------------------------------------------------------------------------
  # Schema Registry — stores Avro/JSON schemas for Kafka topics
  # Debezium can register schemas here; consumers validate against them
  # ---------------------------------------------------------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: outbox_schema_registry
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - cdc-net

  # ---------------------------------------------------------------------------
  # Kafka Connect (with Debezium) — WAL reader + CDC engine
  # This container has Debezium PostgreSQL connector + Confluent JDBC sink
  # pre-installed via the custom Dockerfile in infra/debezium/
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # KAFKA CONNECT (Debezium)
  #
  # WHY build instead of using a pre-built image:
  #   The base cp-kafka-connect image has no connectors installed.
  #   Our Dockerfile runs `confluent-hub install` to add:
  #     1. debezium-connector-postgresql — reads WAL (source)
  #     2. kafka-connect-jdbc           — writes to postgres-analytics (sink)
  #
  # WHY depends_on with condition: service_healthy:
  #   Debezium tries to connect to Postgres immediately on startup to create
  #   the replication slot. If Postgres isn't fully ready yet, Debezium
  #   crashes and restarts. The healthcheck on postgres prevents this race.
  #
  # HOW connectors are registered:
  #   The container exposes a REST API on port 8083. After startup you POST
  #   the connector config JSON to /connectors. The register_connectors.sh
  #   script does this. The ./infra/debezium/connectors/ volume mount is
  #   only used by that script — Kafka Connect itself reads config from Kafka
  #   internal topics (_connect-configs), not from files.
  # ---------------------------------------------------------------------------
  
  kafka-connect:
    build:
      context: ./infra/kafka/debezium
      dockerfile: Dockerfile
    container_name: outbox_kafka_connect
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"   # Kafka Connect REST API (register/manage connectors)
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: outbox-cdc-connect-group
      # These three topics are how Kafka Connect stores its own state in Kafka
      # (connector configs, WAL offsets, connector running/paused/failed status)
      # Internal Kafka topics for Connect cluster state
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      # Converters — we use JSON (no schema embedded) for simplicity
      # Switch to AvroConverter + schema-registry for strict schema enforcement
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "true"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "true"
      # Plugin path where connector JARs are mounted
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components,/connectors
    volumes:
      - ./infra/kafka/debezium/connectors:/connectors:ro
    networks:
      - cdc-net

  # ---------------------------------------------------------------------------
  # Kafka UI — visual management for topics, consumer groups, messages
  # ---------------------------------------------------------------------------

  # WHY it's here:
  #   This is your primary debugging tool. You can:
  #     - See topics created by Debezium in real time
  #     - Inspect every message payload on outbox.event.orders
  #     - Monitor consumer group offsets (is your consumer keeping up?)
  #     - Check kafka-connect connector status without curl
  #   Visit: http://localhost:8080
  # ---------------------------------------------------------------------------

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: outbox_kafka_ui
    restart: unless-stopped
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    networks:
      - cdc-net


  # ---------------------------------------------------------------------------
  # PostgreSQL Analytics — CDC sink (current-state read replica)
  # Receives upserts from Kafka via JDBC Sink connector.
  # Runs on host port 5433 to avoid clash with source Postgres on 5432.
  # To upgrade to ClickHouse later: swap this service + 02-jdbc-sink.json only.
  # ---------------------------------------------------------------------------
  postgres-analytics:
    image: postgres:16-alpine
    container_name: outbox_postgres_analytics
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${ANALYTICS_POSTGRES_USER:-analyticsuser}
      POSTGRES_PASSWORD: ${ANALYTICS_POSTGRES_PASSWORD:-analyticspass}
      POSTGRES_DB: ${ANALYTICS_POSTGRES_DB:-analyticsdb}
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data
      - ./infra/postgres-analytics/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ANALYTICS_POSTGRES_USER:-analyticsuser} -d ${ANALYTICS_POSTGRES_DB:-analyticsdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cdc-net

  # ---------------------------------------------------------------------------
  # FastAPI application — the REST API layer
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: outbox_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-orderuser}:${POSTGRES_PASSWORD:-orderpass}@postgres:5432/${POSTGRES_DB:-ordersdb}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./api:/app:ro   # live reload in dev; remove in prod
    networks:
      - cdc-net